<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Pit</title>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --shell: #d5d0c8;
    --shell-light: #e8e4dc;
    --shell-dark: #b8b3aa;
    --shell-edge: #c5c0b8;
    --screen-bg: #2a4a2a;
    --screen-glow: rgba(120, 220, 80, 0.08);
    --lcd-tint: rgba(120, 220, 80, 0.03);
    --text-lcd: #3a5a1a;
    --text-dim: #5a8a3a;
    --text-label: #8a8578;
    --accent-a: #ef4444;
    --accent-b: #facc15;
    --accent-x: #22c55e;
    --accent-y: #3b82f6;
    --btn-face: #c0bbb2;
    --btn-shadow: #a09a90;
    --btn-highlight: #d8d4cc;
    --led-green: #22c55e;
    --led-red: #ef4444;
    --led-off: #a0a090;
    --grid: rgba(60, 100, 40, 0.1);
    --ground: rgba(60, 100, 40, 0.3);
    --surface-alt: rgba(60, 100, 40, 0.05);
    --body-bg: #c0baa8;
    --stat-bg: rgba(0,0,0,0.08);
    --stat-border: rgba(0,0,0,0.1);
    --screen-border: #1a3a1a;
    --scanline: rgba(0,0,0,0.04);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --shell: #2d2d3d;
      --shell-light: #3a3a4d;
      --shell-dark: #1e1e2a;
      --shell-edge: #444460;
      --screen-bg: #0a1628;
      --screen-glow: rgba(56, 189, 248, 0.08);
      --lcd-tint: rgba(56, 189, 248, 0.03);
      --text-lcd: #38bdf8;
      --text-dim: #1e3a5f;
      --text-label: #7a7a9a;
      --btn-face: #404058;
      --btn-shadow: #2a2a3a;
      --btn-highlight: #52526a;
      --led-green: #4ade80;
      --led-red: #f87171;
      --led-off: #2a3a2a;
      --grid: rgba(56, 189, 248, 0.06);
      --ground: rgba(56, 189, 248, 0.2);
      --surface-alt: rgba(56, 189, 248, 0.03);
      --body-bg: #1a1a2e;
      --stat-bg: rgba(0,0,0,0.3);
      --stat-border: rgba(56,189,248,0.1);
      --screen-border: #111;
      --scanline: rgba(0,0,0,0.08);
    }
  }

  body {
    background: var(--body-bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-lcd);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* ── Console shell ──────────────────────────────────────────── */
  .console {
    background: var(--shell);
    border-radius: 12px 12px 20px 20px;
    padding: 20px 24px 20px;
    max-width: 900px;
    width: 100%;
    box-shadow:
      0 2px 0 var(--shell-edge),
      0 4px 0 var(--shell-dark),
      0 8px 24px rgba(0,0,0,0.5),
      inset 0 1px 0 var(--shell-light);
    position: relative;
  }


  /* ── Header area ────────────────────────────────────────────── */
  .console-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: var(--text-label);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
  }

  .power-led {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--led-off);
    transition: all 0.3s;
  }
  .power-led.on {
    background: var(--led-green);
    box-shadow: 0 0 8px var(--led-green), 0 0 20px rgba(74,222,128,0.3);
  }
  .power-led.error {
    background: var(--led-red);
    box-shadow: 0 0 8px var(--led-red), 0 0 20px rgba(248,113,113,0.3);
  }

  .status-text {
    font-size: 13px;
    color: var(--text-label);
    letter-spacing: 0.05em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Screen bezel ───────────────────────────────────────────── */
  .screen-bezel {
    background: var(--screen-border);
    border-radius: 8px;
    padding: 6px;
    box-shadow:
      inset 0 2px 6px rgba(0,0,0,0.8),
      0 1px 0 var(--shell-light);
  }

  .screen {
    position: relative;
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    background: var(--screen-bg);
    box-shadow: inset 0 0 40px var(--screen-glow);
  }

  /* Scanline overlay */
  .screen::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  canvas { display: block; width: 100%; border-radius: 4px; }

  .emoji-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
  }

  .emoji-drop {
    position: absolute;
    font-size: 20px;
    line-height: 1;
    text-align: center;
    width: 28px;
    height: 28px;
    margin-left: -14px;
    margin-top: -14px;
    will-change: transform;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
  }

  .emoji-drop img { width: 22px; height: 22px; display: block; margin: 3px auto; }

  .emoji-drop.removing {
    opacity: 0;
    transform: scale(0.3) !important;
    transition: opacity 0.4s ease-out, transform 0.4s ease-out !important;
  }

  /* ── Axis labels (inside screen) ────────────────────────────── */
  .axis {
    display: flex;
    margin-top: 6px;
    padding: 0 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-lcd);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    height: 22px;
    align-items: center;
  }
  .axis span { flex: 1; text-align: center; }

  /* ── Control panel (below screen) ───────────────────────────── */
  .control-panel {
    display: flex;
    align-items: center;
    margin-top: 20px;
    gap: 12px;
  }

  /* ── Stats as LCD readout ───────────────────────────────────── */
  .stats {
    display: flex;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }

  .stat {
    flex: 1;
    background: var(--stat-bg);
    border: 1px solid var(--stat-border);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }

  .stat-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    font-weight: bold;
    color: var(--text-lcd);
    display: block;
    text-shadow: 0 0 8px rgba(56,189,248,0.4);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Console buttons ────────────────────────────────────────── */
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  button {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    border: none;
    cursor: pointer;
    transition: all 0.1s ease;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Round arcade buttons */
  .btn-round {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--btn-highlight) 0%, var(--btn-face) 40%, var(--btn-shadow) 100%);
    color: rgba(255,255,255,0.7);
    box-shadow:
      0 3px 0 var(--btn-shadow),
      0 4px 8px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }

  .btn-round:hover {
    background: linear-gradient(180deg, #5e5e78 0%, var(--btn-highlight) 40%, var(--btn-face) 100%);
  }

  .btn-round:active {
    transform: translateY(2px);
    box-shadow:
      0 1px 0 var(--btn-shadow),
      0 1px 4px rgba(0,0,0,0.4),
      inset 0 1px 2px rgba(0,0,0,0.3);
  }

  .btn-round.active {
    background: linear-gradient(180deg, #6366f1 0%, #4f46e5 40%, #3730a3 100%);
    color: #fff;
    box-shadow:
      0 3px 0 #312e81,
      0 4px 8px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.2),
      0 0 12px rgba(99,102,241,0.3);
  }

  /* Color-coded button labels */
  .btn-a { color: var(--text-label); }
  .btn-b { color: var(--accent-b); }
  .btn-x { color: var(--accent-x); }

  /* Pill button (select/start style) */
  .btn-pill {
    background: var(--shell-dark);
    color: var(--text-label);
    border-radius: 14px;
    padding: 10px 20px;
    min-width: 100px;
    text-align: center;
    box-shadow:
      inset 0 1px 3px rgba(0,0,0,0.5),
      0 1px 0 var(--shell-light);
    font-size: 7px;
  }

  .btn-pill:hover { color: var(--text-lcd); }
  .btn-pill:active { transform: translateY(1px); box-shadow: inset 0 2px 4px rgba(0,0,0,0.6); }

  /* ── Button group with labels ───────────────────────────────── */
  .btn-group {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .btn-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: var(--text-label);
    text-transform: uppercase;
  }

  /* ── Speaker grille ─────────────────────────────────────────── */
  .speaker {
    display: flex;
    gap: 3px;
    transform: rotate(-30deg);
    margin-left: 12px;
  }
  .speaker-line {
    width: 3px;
    height: 32px;
    border-radius: 1px;
    background: var(--shell-dark);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
  }

  /* ── Model label ────────────────────────────────────────────── */
  .model-label {
    text-align: center;
    margin-top: 16px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--text-label);
    letter-spacing: 0.15em;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="console">
  <!-- Header: brand + power LED -->
  <div class="console-header">
    <div class="brand">
      <h1>Emoji Pit</h1>
    </div>
    <div class="header-right">
      <span class="status-text" id="statusText">Connecting...</span>
      <div class="power-led" id="statusDot"></div>
    </div>
  </div>

  <!-- Screen -->
  <div class="screen-bezel">
    <div class="screen">
      <canvas id="rc"></canvas>
      <div class="emoji-layer" id="emojiLayer"></div>
    </div>
  </div>
  <div class="axis" id="axisRow"></div>

  <!-- Control panel -->
  <div class="control-panel">
    <!-- Stats LCD -->
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total</div>
        <span class="stat-value" id="totalOut">0</span>
      </div>
      <div class="stat">
        <div class="stat-label">Rate</div>
        <span class="stat-value" id="rateOut">0/s</span>
      </div>
      <div class="stat">
        <div class="stat-label">Top</div>
        <span class="stat-value" id="topOut">---</span>
      </div>
    </div>

    <!-- Buttons -->
    <div class="controls">
      <button class="btn-pill" id="modeBtn" onclick="toggleMode()">Group</button>

      <button class="btn-pill" onclick="resetAll()">Reset</button>

    </div>
  </div>

  <div class="model-label">EP-1000 &bull; Slack Reaction Engine</div>
</div>

<script>
// ── Matter.js setup ───────────────────────────────────────────────────────────
const { Engine, World, Bodies, Body, Composite, Events } = Matter;

const CANVAS_HEIGHT = 440;
const PADDING = 0;
const GROUND_OFFSET = 32;
const SIZE = 24;
const HALF = SIZE / 2;

const canvas = document.getElementById('rc');
const ctx = canvas.getContext('2d');
const emojiLayer = document.getElementById('emojiLayer');
const rootStyle = getComputedStyle(document.documentElement);
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const BG = rootStyle.getPropertyValue('--screen-bg').trim();
const GRID_COLOR = rootStyle.getPropertyValue('--grid').trim();
const imageCache = {};

// ── Physics engine ────────────────────────────────────────────────────────────
const engine = Engine.create({ gravity: { x: 0, y: 1.5 } });
const world = engine.world;

// Track drops: { body, el, emoji, gIdx, removing }
let drops = [];
let walls = [];   // current wall bodies
let total = 0, countWindow = [], emojiCounts = {}, emojiMeta = {};
let grouped = false;

// ── Emoji groups ──────────────────────────────────────────────────────────────
const GROUPS = [
  { label: "Love",      emojis: ["heart","hearts","heart_eyes","sparkling_heart","two_hearts","revolving_hearts","heartpulse","orange_heart","yellow_heart","green_heart","blue_heart","purple_heart"] },
  { label: "Celebrate", emojis: ["tada","confetti_ball","partying_face","balloon","fireworks","sparkles","star","star2","dizzy","trophy"] },
  { label: "Hype",      emojis: ["fire","rocket","zap","muscle","raised_hands","clap","100","boom","exploding_head"] },
  { label: "Agree",     emojis: ["thumbsup","+1","white_check_mark","heavy_check_mark","ok_hand","handshake","pray"] },
  { label: "Funny",     emojis: ["joy","rofl","sweat_smile","laughing","grinning","smile","slightly_smiling_face","lol"] },
  { label: "Thinking",  emojis: ["thinking_face","eyes","face_with_monocle","nerd_face","brain","question","grey_question"] },
  { label: "Negative",  emojis: ["thumbsdown","-1","disappointed","cry","sob","rage","face_with_symbols_on_mouth","no_entry","x"] },
  { label: "Other",     emojis: [] },
];

function groupIndexFor(emojiName) {
  const base = emojiName.replace(/::?skin-tone-\d$/, '');
  const idx = GROUPS.findIndex(g => g.emojis.includes(base));
  return idx === -1 ? GROUPS.length - 1 : idx;
}

// ── Wall management ───────────────────────────────────────────────────────────
function groundY() { return CANVAS_HEIGHT - GROUND_OFFSET; }

function buildWalls() {
  // Remove old walls
  if (walls.length) Composite.remove(world, walls);
  walls = [];

  const W = canvas.width;
  const gy = groundY();
  const thick = 40;

  // Ground
  walls.push(Bodies.rectangle(W / 2, gy + thick / 2, W, thick, { isStatic: true }));
  // Left wall
  walls.push(Bodies.rectangle(-thick / 2 + PADDING, gy / 2, thick, gy * 2, { isStatic: true }));
  // Right wall
  walls.push(Bodies.rectangle(W - PADDING + thick / 2, gy / 2, thick, gy * 2, { isStatic: true }));

  if (grouped) {
    const usable = W - PADDING * 2;
    const gw = usable / GROUPS.length;
    // Divider walls between groups
    for (let i = 1; i < GROUPS.length; i++) {
      const x = PADDING + i * gw;
      walls.push(Bodies.rectangle(x, gy / 2, 2, gy * 2, { isStatic: true }));
    }
  }

  Composite.add(world, walls);
}

function groupBounds(gIdx) {
  const W = canvas.width;
  const usable = W - PADDING * 2;
  if (!grouped) {
    return { left: PADDING, right: W - PADDING, center: W / 2 };
  }
  const gw = usable / GROUPS.length;
  return {
    left: PADDING + gIdx * gw,
    right: PADDING + (gIdx + 1) * gw,
    center: PADDING + (gIdx + 0.5) * gw,
  };
}

// ── Toggle grouped mode ───────────────────────────────────────────────────────
function toggleMode() {
  grouped = !grouped;
  document.getElementById('modeBtn').textContent = grouped ? 'Mix' : 'Group';
  document.getElementById('modeBtn').classList.toggle('active', grouped);
  buildWalls();
  buildAxis();
  // Reposition each body to its correct column and let it fall
  for (const d of drops) {
    if (d.removing) continue;
    const bounds = groupBounds(d.gIdx);
    const newX = bounds.center + (Math.random() - 0.5) * SIZE;
    Body.setPosition(d.body, { x: newX, y: -SIZE - Math.random() * 60 });
    Body.setVelocity(d.body, { x: (Math.random() - 0.5) * 1, y: 1 + Math.random() * 2 });
    Body.setAngularVelocity(d.body, (Math.random() - 0.5) * 0.15);
  }
}

// ── Twemoji CDN ───────────────────────────────────────────────────────────────
const TWEMOJI_BASE = 'https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/svg/';

function unicodeToTwemojiUrl(unicode) {
  const codepoints = [...unicode]
    .map(c => c.codePointAt(0).toString(16))
    .filter(cp => cp !== 'fe0f');
  return TWEMOJI_BASE + codepoints.join('-') + '.svg';
}

// ── Emoji element creation ────────────────────────────────────────────────────
function createEmojiImg(src, alt) {
  if (imageCache[src]) return imageCache[src].cloneNode();
  const img = document.createElement('img');
  img.src = src;
  img.alt = alt;
  img.loading = 'eager';
  imageCache[src] = img;
  return img.cloneNode(true);
}

function createEmojiEl(msg) {
  const el = document.createElement('div');
  el.className = 'emoji-drop';
  el.dataset.emoji = msg.emoji;

  if (msg.unicode) {
    el.appendChild(createEmojiImg(unicodeToTwemojiUrl(msg.unicode), msg.unicode));
  } else if (msg.url) {
    el.appendChild(createEmojiImg(msg.url, `:${msg.emoji}:`));
  } else {
    el.textContent = `:${msg.emoji}:`;
    el.style.fontSize = '10px';
    el.style.width = '48px';
    el.style.marginLeft = '-24px';
    el.style.overflow = 'hidden';
    el.style.textOverflow = 'ellipsis';
    el.style.whiteSpace = 'nowrap';
  }
  return el;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('totalOut').textContent = total;
  const topEl = document.getElementById('topOut');
  const top = Object.entries(emojiCounts).sort((a,b) => b[1]-a[1])[0];
  if (top) {
    const meta = emojiMeta[top[0]];
    const src = meta?.unicode ? unicodeToTwemojiUrl(meta.unicode) : meta?.url;
    if (src) {
      topEl.innerHTML = `<img src="${src}" style="width:26px;height:26px;vertical-align:middle;margin-right:6px">${top[1]}`;
    } else {
      topEl.textContent = `:${top[0]}: x${top[1]}`;
    }
  } else {
    topEl.textContent = '---';
  }
}

setInterval(() => {
  const now = Date.now();
  countWindow = countWindow.filter(t => now - t < 5000);
  document.getElementById('rateOut').textContent = (countWindow.length / 5).toFixed(1) + '/s';
}, 500);

// ── Add / remove reactions ────────────────────────────────────────────────────
function addReaction(msg) {
  const gIdx = groupIndexFor(msg.emoji);
  const bounds = groupBounds(gIdx);
  const cx = bounds.center + (Math.random() - 0.5) * SIZE;

  total++;
  countWindow.push(Date.now());
  emojiCounts[msg.emoji] = (emojiCounts[msg.emoji] || 0) + 1;
  if (msg.unicode || msg.url) emojiMeta[msg.emoji] = { unicode: msg.unicode, url: msg.url };
  updateStats();

  const el = createEmojiEl(msg);
  emojiLayer.appendChild(el);

  const body = Bodies.circle(cx, -SIZE - Math.random() * 60, HALF, {
    restitution: 0.3,
    friction: 0.5,
    frictionAir: 0.01,
    density: 0.002,
  });
  Body.setVelocity(body, { x: (Math.random() - 0.5) * 1, y: 1 + Math.random() * 2 });
  Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.15);
  Composite.add(world, body);

  drops.push({ body, el, emoji: msg.emoji, gIdx, removing: false });
}

function removeReaction(msg) {
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    if (d.emoji === msg.emoji && !d.removing && d.body.speed < 0.5) {
      d.removing = true;
      d.el.classList.add('removing');

      total = Math.max(0, total - 1);
      emojiCounts[msg.emoji] = Math.max(0, (emojiCounts[msg.emoji] || 0) - 1);
      if (emojiCounts[msg.emoji] === 0) { delete emojiCounts[msg.emoji]; delete emojiMeta[msg.emoji]; }
      updateStats();

      setTimeout(() => {
        d.el.remove();
        Composite.remove(world, d.body);
        const idx = drops.indexOf(d);
        if (idx !== -1) drops.splice(idx, 1);
      }, 400);
      break;
    }
  }
}

// ── Simulate ──────────────────────────────────────────────────────────────────
const SIM_EMOJI = [
  'heart','heart','heart','fire','fire','fire','thumbsup','thumbsup','thumbsup','thumbsup',
  '+1','+1','tada','tada','joy','joy','rocket','rocket','100','100',
  'eyes','eyes','pray','pray','clap','clap','sparkles','muscle',
  'heart_eyes','star','raised_hands','ok_hand','boom','zap',
  'thinking_face','rofl','sob','trophy','handshake','brain',
  'sweat_smile','laughing','grinning','star2','confetti_ball',
  'white_check_mark','heavy_check_mark','partying_face','exploding_head',
  'thumbsdown','cry','disappointed','nerd_face','face_with_monocle',
  'orange_heart','purple_heart','blue_heart','green_heart','yellow_heart',
];

const SIM_UNICODE = {
  'heart':'❤️','fire':'🔥','thumbsup':'👍','+1':'👍','tada':'🎉','joy':'😂',
  'rocket':'🚀','100':'💯','eyes':'👀','pray':'🙏','clap':'👏','sparkles':'✨',
  'muscle':'💪','heart_eyes':'😍','star':'⭐','raised_hands':'🙌','ok_hand':'👌',
  'boom':'💥','zap':'⚡','thinking_face':'🤔','rofl':'🤣','sob':'😭',
  'trophy':'🏆','handshake':'🤝','brain':'🧠','sweat_smile':'😅','laughing':'😆',
  'grinning':'😀','star2':'🌟','confetti_ball':'🎊','white_check_mark':'✅',
  'heavy_check_mark':'✔️','partying_face':'🥳','exploding_head':'🤯',
  'thumbsdown':'👎','cry':'😢','disappointed':'😞','nerd_face':'🤓',
  'face_with_monocle':'🧐','orange_heart':'🧡','purple_heart':'💜',
  'blue_heart':'💙','green_heart':'💚','yellow_heart':'💛',
};

function simulate(count) {
  for (let i = 0; i < count; i++) {
    const emoji = SIM_EMOJI[Math.floor(Math.random() * SIM_EMOJI.length)];
    const unicode = SIM_UNICODE[emoji];
    setTimeout(() => addReaction({ type: 'reaction', emoji, unicode }), i * 50);
  }
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawBg() {
  const W = canvas.width, H = CANVAS_HEIGHT;
  ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);

  if (grouped) {
    GROUPS.forEach((g, i) => {
      const b = groupBounds(i);
      if (i % 2 === 0) {
        ctx.fillStyle = rootStyle.getPropertyValue('--surface-alt').trim();
        ctx.fillRect(b.left, 0, b.right - b.left, groundY());
      }
      ctx.strokeStyle = GRID_COLOR; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(b.left, 0); ctx.lineTo(b.left, groundY()); ctx.stroke();
    });
  }

  ctx.strokeStyle = rootStyle.getPropertyValue('--ground').trim();
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PADDING, groundY()); ctx.lineTo(canvas.width - PADDING, groundY()); ctx.stroke();
}

// ── Render loop ───────────────────────────────────────────────────────────────
function frame() {
  Engine.update(engine, 1000 / 60);
  drawBg();

  for (const d of drops) {
    if (d.removing) continue;
    const { x, y } = d.body.position;
    const angle = d.body.angle;
    d.el.style.left = x + 'px';
    d.el.style.top = y + 'px';
    d.el.style.transform = `rotate(${angle}rad)`;
    d.el.style.opacity = d.body.speed < 0.5 ? '1' : '0.7';
  }

  requestAnimationFrame(frame);
}

// ── Reset / resize ────────────────────────────────────────────────────────────
function clearPit() {
  for (const d of drops) {
    d.el.remove();
    Composite.remove(world, d.body);
  }
  drops = [];
  total = 0; countWindow = []; emojiCounts = {}; emojiMeta = {};
  document.getElementById('totalOut').textContent = '0';
  document.getElementById('rateOut').textContent = '0/s';
  document.getElementById('topOut').textContent = '---';
}

function resetAll() {
  if (!confirm('Clear all reactions? This cannot be undone.')) return;
  fetch('/reset', { method: 'POST' }).catch(() => {});
  clearPit();
}

function resize() {
  const W = Math.floor(canvas.parentElement.getBoundingClientRect().width) || 800;
  canvas.width = W; canvas.height = CANVAS_HEIGHT; canvas.style.height = CANVAS_HEIGHT + 'px';
  emojiLayer.style.height = CANVAS_HEIGHT + 'px';
  buildWalls();
  buildAxis();
}

function buildAxis() {
  const el = document.getElementById('axisRow');
  el.innerHTML = GROUPS.map(g => `<span>${grouped ? g.label : '&nbsp;'}</span>`).join('');
}

window.addEventListener('resize', () => { resize(); clearPit(); });
resize();
requestAnimationFrame(frame);

// ── WebSocket connection ──────────────────────────────────────────────────────
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const WS_URL = `ws://${location.host}`;

function connect() {
  const ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    statusDot.className = 'power-led on';
    statusText.textContent = 'ONLINE';
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'history') {
        msg.reactions.forEach((r, i) => {
          setTimeout(() => addReaction({ type: 'reaction', ...r }), i * 80);
        });
      } else if (msg.type === 'reaction') {
        addReaction(msg);
      } else if (msg.type === 'reaction_removed') {
        removeReaction(msg);
      } else if (msg.type === 'reset') {
        clearPit();
      }
    } catch {}
  };

  ws.onclose = () => {
    statusDot.className = 'power-led';
    statusText.textContent = 'RECONNECTING...';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => {
    statusDot.className = 'power-led error';
    statusText.textContent = 'ERROR';
  };
}

connect();
</script>
